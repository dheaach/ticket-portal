<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Extension Icons</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      max-width: 800px;
      margin: 0 auto;
    }
    .icon-preview {
      display: flex;
      gap: 20px;
      margin: 20px 0;
      align-items: center;
    }
    canvas {
      border: 1px solid #ddd;
      background: #f5f5f5;
    }
    button {
      padding: 10px 20px;
      background: #4CAF50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background: #45a049;
    }
    .info {
      background: #e3f2fd;
      padding: 15px;
      border-radius: 4px;
      margin: 20px 0;
    }
  </style>
</head>
<body>
  <h1>📸 Generate Extension Icons</h1>
  
  <div class="info">
    <p><strong>Instructions:</strong></p>
    <ol>
      <li>Click the &quot;Generate Icons&quot; button below</li>
      <li>Icons are generated and downloaded automatically</li>
      <li>Save the PNG files to <code>chrome-ext/icons/</code></li>
      <li>Reload the extension in Chrome</li>
    </ol>
  </div>

  <div class="icon-preview">
    <div>
      <h3>16x16</h3>
      <canvas id="icon16" width="16" height="16"></canvas>
    </div>
    <div>
      <h3>48x48</h3>
      <canvas id="icon48" width="48" height="48"></canvas>
    </div>
    <div>
      <h3>128x128</h3>
      <canvas id="icon128" width="128" height="128"></canvas>
    </div>
  </div>

  <button onclick="generateIcons()">Generate Icons</button>

  <script>
    function drawIcon(canvas, size) {
      const ctx = canvas.getContext('2d');
      
      // Background
      ctx.fillStyle = '#4CAF50';
      ctx.fillRect(0, 0, size, size);
      
      // Camera icon (simplified)
      ctx.fillStyle = 'white';
      const centerX = size / 2;
      const centerY = size / 2;
      const radius = size * 0.25;
      
      // Camera body (rounded rectangle)
      const bodyX = centerX - radius;
      const bodyY = centerY - radius * 0.6;
      const bodyW = radius * 2;
      const bodyH = radius * 1.2;
      const cornerRadius = size * 0.1;
      
      ctx.beginPath();
      ctx.moveTo(bodyX + cornerRadius, bodyY);
      ctx.lineTo(bodyX + bodyW - cornerRadius, bodyY);
      ctx.quadraticCurveTo(bodyX + bodyW, bodyY, bodyX + bodyW, bodyY + cornerRadius);
      ctx.lineTo(bodyX + bodyW, bodyY + bodyH - cornerRadius);
      ctx.quadraticCurveTo(bodyX + bodyW, bodyY + bodyH, bodyX + bodyW - cornerRadius, bodyY + bodyH);
      ctx.lineTo(bodyX + cornerRadius, bodyY + bodyH);
      ctx.quadraticCurveTo(bodyX, bodyY + bodyH, bodyX, bodyY + bodyH - cornerRadius);
      ctx.lineTo(bodyX, bodyY + cornerRadius);
      ctx.quadraticCurveTo(bodyX, bodyY, bodyX + cornerRadius, bodyY);
      ctx.closePath();
      ctx.fill();
      
      // Lens
      ctx.fillStyle = '#4CAF50';
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius * 0.5, 0, Math.PI * 2);
      ctx.fill();
      
      // Flash
      if (size >= 48) {
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(centerX + radius * 0.7, centerY - radius * 0.7, size * 0.08, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function downloadCanvas(canvas, filename) {
      canvas.toBlob((blob) => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        URL.revokeObjectURL(url);
      }, 'image/png');
    }

    function generateIcons() {
      const sizes = [16, 48, 128];
      
      sizes.forEach(size => {
        const canvas = document.getElementById(`icon${size}`);
        drawIcon(canvas, size);
        downloadCanvas(canvas, `icon${size}.png`);
      });
      
      alert('Icons generated and downloaded. Save them to the chrome-ext/icons/ folder.');
    }

    // Draw preview on load
    window.onload = () => {
      drawIcon(document.getElementById('icon16'), 16);
      drawIcon(document.getElementById('icon48'), 48);
      drawIcon(document.getElementById('icon128'), 128);
    };
  </script>
</body>
</html>
