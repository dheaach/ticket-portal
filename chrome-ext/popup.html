<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Screenshot & Upload</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📸 Screenshot & Upload</h1>
    </div>

    <div class="auth-section" id="authSection">
      <div class="form-group">
        <label for="apiUrl">Next.js API URL:</label>
        <input type="text" id="apiUrl" placeholder="https://your-app.vercel.app or http://localhost:3000">
        <small style="color: #666; font-size: 11px; display: block; margin-top: 4px;">
          Enter your Next.js app base URL (without /api/screenshots)
        </small>
      </div>
      <div class="form-group">
        <label for="apiToken">API Token:</label>
        <input type="password" id="apiToken" placeholder="sk_... (from Profile > API Tokens)">
        <small style="color: #666; font-size: 11px; display: block; margin-top: 4px;">
          Create tokens on the app Profile page
        </small>
      </div>
      <button id="saveConfigBtn" class="btn btn-primary">Save configuration</button>
      <div id="configStatus" class="status-message"></div>
    </div>

    <div class="main-section" id="mainSection" style="display: none;">
      <!-- Tabs -->
      <div class="tabs">
        <button class="tab-btn active" data-tab="capture">📷 Capture</button>
        <button class="tab-btn" data-tab="gallery">🖼️ Gallery</button>
      </div>

      <!-- Capture Tab -->
      <div class="tab-content active" id="captureTab">
        <div class="preview-container" id="previewContainer" style="display: none;">
          <img id="screenshotPreview" alt="Screenshot preview">
          <div class="preview-actions">
            <button id="retakeBtn" class="btn btn-secondary">Retake</button>
            <button id="uploadBtn" class="btn btn-primary">Upload</button>
          </div>
        </div>

        <div class="actions">
          <button id="captureBtn" class="btn btn-primary btn-large">
            📷 Capture screenshot
          </button>
          <button id="logoutBtn" class="btn btn-secondary">Logout</button>
        </div>
      </div>

      <!-- Gallery Tab -->
      <div class="tab-content" id="galleryTab" style="display: none;">
        <div class="gallery-header">
          <button id="refreshGalleryBtn" class="btn btn-secondary" style="width: auto; padding: 6px 12px;">
            🔄 Refresh
          </button>
        </div>
        <div id="galleryContainer" class="gallery-container">
          <div class="loading-gallery">Loading gallery...</div>
        </div>
      </div>

      <div class="auto-screenshot-section" style="margin-top: 20px; padding-top: 20px; border-top: 1px solid #ddd;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
          <div>
            <strong>🔄 Auto Screenshot</strong>
            <div style="font-size: 11px; color: #666; margin-top: 4px;">
              Capture a screenshot automatically every X minutes
            </div>
          </div>
          <label class="switch">
            <input type="checkbox" id="autoScreenshotToggle">
            <span class="slider"></span>
          </label>
        </div>
        
        <div id="autoScreenshotSettings" style="display: none;">
          <div class="form-group">
            <label for="intervalMinutes">Interval (minutes):</label>
            <input type="number" id="intervalMinutes" min="1" max="60" value="5" style="width: 100%; padding: 8px;">
            <small style="color: #666; font-size: 11px; display: block; margin-top: 4px;">
              Screenshots run every X minutes (min: 1, max: 60)
            </small>
          </div>
          <div id="autoScreenshotStatus" style="font-size: 12px; color: #666; margin-top: 10px;"></div>
        </div>
      </div>

      <div id="statusMessage" class="status-message"></div>
    </div>
  </div>

  <script src="api-client.js"></script>
  <script src="popup.js"></script>
</body>
</html>
